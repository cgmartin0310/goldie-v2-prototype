services:
  - type: web
    name: goldie-v2-backend
    env: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PORT
        value: "3002"
      - key: CORS_ORIGIN
        value: "https://goldie-v2-frontend.onrender.com"

  - type: web
    name: goldie-v2-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: "https://goldie-v2-backend.onrender.com"
